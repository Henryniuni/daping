<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千川直播聚合监控中心</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="header-bar">
    <div class="header-left">
      <h1>📊 千川直播聚合监控中心</h1>
      <span class="subtitle">实时多账号数据大屏</span>
    </div>
    <div class="header-right">
      <button id="btn-refresh-all" class="btn">🔄 全部刷新</button>
      <button id="btn-clear-all" class="btn btn-danger">🗑️ 清空全部</button>
      <button id="btn-asr-settings" class="btn">⚙️ ASR 设置</button>
      <button id="btn-forbidden-words" class="btn">🚫 违规词</button>
      <div class="layout-selector">
        <span>布局:</span>
        <select id="layout-select">
          <option value="1" selected>1×1</option>
          <option value="2">2×2</option>
          <option value="3">3×3</option>
          <option value="4">4×4</option>
        </select>
      </div>
    </div>
  </header>

  <!-- Tab 栏 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-boards">📊 聚合看板</button>
    <button class="tab-btn" id="tab-btn-live">📺 直播间监控</button>
  </div>

  <!-- 主体容器（Tab 1：聚合看板） -->
  <main id="container" class="container layout-1">
    <!-- 空状态（默认显示） -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">暂无直播间数据</div>
      <div class="empty-tip">请在千川页面点击插件图标，选择"捕获当前大屏"</div>
    </div>
  </main>

  <!-- Tab 2：直播间监控 -->
  <div id="live-room-view" style="display:none">
    <div class="live-room-layout">
      <!-- 左侧：URL 输入 + iframe -->
      <div class="live-room-left">
        <div class="live-url-bar">
          <input id="live-url-input" type="text" placeholder="输入抖音直播间地址，例：https://live.douyin.com/xxxxx">
          <button id="btn-load-live" class="btn">↗ 载入</button>
        </div>
        <div class="live-iframe-wrapper">
          <video id="live-video" autoplay playsinline></video>
          <div id="live-tab-status" class="live-tab-status">输入直播间地址，点击「↗ 载入」打开</div>
        </div>
      </div>
      <!-- 右侧：转写面板 -->
      <div class="live-room-right">
        <div class="live-transcript-panel">
          <div class="transcript-header">
            <span class="transcript-header-title">🎙 实时转写</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="transcript-speed live-speed"><span>语速：— 字/分钟</span></span>
              <button class="btn-mic" id="live-btn-mic" title="开始/停止转写">🎤</button>
              <button class="btn-mic btn-download-transcript" id="live-btn-download" title="下载转写文本">⬇️</button>
            </div>
          </div>
          <div class="transcript-text" id="live-transcript-text"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部栏 -->
  <footer class="footer">
    💡 提示：如显示"拒绝连接"，请确保已在千川页面登录
  </footer>

  <!-- ASR 设置弹窗 -->
  <div id="asr-settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span>⚙️ 腾讯云 ASR 设置</span>
        <button id="btn-modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label>AppId</label>
        <input id="asr-appid" type="text" placeholder="例：1257796542" autocomplete="off">
        <label>SecretId</label>
        <input id="asr-secretid" type="text" placeholder="AKID..." autocomplete="off">
        <label>SecretKey</label>
        <input id="asr-secretkey" type="password" placeholder="SecretKey" autocomplete="off">
        <div class="modal-tip">
          凭证保存在本地浏览器存储中，不会上传到任何服务器。<br>
          没有 Key？<a href="https://console.cloud.tencent.com/asr" target="_blank" class="modal-link">前往腾讯云控制台申请 →</a>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-asr-save" class="btn">保存</button>
        <button id="btn-asr-clear" class="btn btn-danger">清除凭证</button>
      </div>
    </div>
  </div>

  <!-- 违规词管理弹窗 -->
  <div id="forbidden-words-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span>🚫 违规词管理</span>
        <button id="btn-fw-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label>违规词列表（每行一个词）</label>
        <textarea id="fw-textarea" placeholder="例：&#10;违禁品&#10;绝对有效&#10;最低价" rows="8"></textarea>
        <div class="fw-upload-row">
          <label class="fw-upload-label" for="fw-file-input">📂 导入文件（.txt / .xlsx / .xls）</label>
          <input id="fw-file-input" type="file" accept=".txt,.xlsx,.xls" style="display:none">
          <span id="fw-count" class="fw-count">共 0 个词</span>
        </div>
        <div class="modal-tip">转写文字中出现违规词时将以红色高亮显示。</div>
      </div>
      <div class="modal-footer">
        <button id="btn-fw-save" class="btn">保存</button>
        <button id="btn-fw-clear" class="btn btn-danger">清空</button>
      </div>
    </div>
  </div>

  <script src="xlsx.mini.min.js"></script>
  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
