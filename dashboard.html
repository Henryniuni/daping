<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千川直播聚合监控中心</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="header-bar">
    <div class="header-left">
      <h1>📊 千川直播聚合监控中心</h1>
      <span class="subtitle">实时多账号数据大屏</span>
    </div>
    <div class="header-right">
      <button id="btn-refresh-all" class="btn">🔄 全部刷新</button>
      <button id="btn-clear-all" class="btn btn-danger">🗑️ 清空全部</button>
      <button id="btn-asr-settings" class="btn">⚙️ ASR 设置</button>
      <div class="layout-selector">
        <span>布局:</span>
        <select id="layout-select">
          <option value="1" selected>1×1</option>
          <option value="2">2×2</option>
          <option value="3">3×3</option>
          <option value="4">4×4</option>
        </select>
      </div>
    </div>
  </header>

  <!-- 主体容器 -->
  <main id="container" class="container layout-1">
    <!-- 空状态（默认显示） -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">暂无直播间数据</div>
      <div class="empty-tip">请在千川页面点击插件图标，选择"捕获当前大屏"</div>
    </div>
  </main>

  <!-- 底部栏 -->
  <footer class="footer">
    💡 提示：如显示"拒绝连接"，请确保已在千川页面登录
  </footer>

  <!-- ASR 设置弹窗 -->
  <div id="asr-settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span>⚙️ 腾讯云 ASR 设置</span>
        <button id="btn-modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label>AppId</label>
        <input id="asr-appid" type="text" placeholder="例：1257796542" autocomplete="off">
        <label>SecretId</label>
        <input id="asr-secretid" type="text" placeholder="AKID..." autocomplete="off">
        <label>SecretKey</label>
        <input id="asr-secretkey" type="password" placeholder="SecretKey" autocomplete="off">
        <div class="modal-tip">
          凭证保存在本地浏览器存储中，不会上传到任何服务器。<br>
          没有 Key？<a href="https://console.cloud.tencent.com/asr" target="_blank" class="modal-link">前往腾讯云控制台申请 →</a>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-asr-save" class="btn">保存</button>
        <button id="btn-asr-clear" class="btn btn-danger">清除凭证</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
